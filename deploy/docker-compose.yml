name: fhjd-cf-process

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:15-alpine}
    container_name: fhjd-cf-process-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fhjd_cf_process}
      POSTGRES_USER: ${POSTGRES_USER:-fhjd_cf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fhjd_cf} -d ${POSTGRES_DB:-fhjd_cf_process}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: fhjd-cf-process-redis
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com/}
        DATABASE_URL: ${DATABASE_URL:-postgresql://fhjd_cf:change_me@postgres:5432/fhjd_cf_process?schema=public}
    container_name: fhjd-cf-process-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://fhjd_cf:change_me@postgres:5432/fhjd_cf_process?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_secret}
      PORT: 3000
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.27-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com/}
    container_name: fhjd-cf-process-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
